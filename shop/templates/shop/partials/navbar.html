<header class="site-header">
    <nav class="navbar container" aria-label="Primary navigation">
        <a class="brand-mark" href="{% url 'home' %}" aria-label="TechMarket home">
            <span class="brand-icon">TM</span>
            <span>TechMarket</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Open menu" data-nav-toggle>
            <span></span><span></span><span></span>
        </button>
        <div class="nav-panel" data-nav-panel>
            <a href="{% url 'catalog' %}">Catalog</a>
            <a href="{% url 'categories' %}">Categories</a>
            <form class="nav-search" action="{% url 'catalog' %}" method="get">
                <label class="sr-only" for="nav-q">Search products</label>
                <input id="nav-q" name="q" type="search" placeholder="Search iPhone, Galaxy, Watch..." value="{{ request.GET.q }}">
                <button class="icon-button" type="submit" aria-label="Search">⌕</button>
            </form>
            <a class="cart-link" href="{% url 'cart' %}">Cart <span>{{ cart_item_count }}</span></a>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}">Profile</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a class="button button-small" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>
</header>
