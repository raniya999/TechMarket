{% extends 'shop/base.html' %}
{% block title %}Login | TechMarket{% endblock %}
{% block content %}
<section class="auth-shell container">
    <div class="auth-copy"><span class="eyebrow">Welcome back</span><h1>Sign in to manage orders and rewards.</h1></div>
    <form class="auth-card" method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>{{ field.label }}{{ field }}{{ field.errors }}</label>
        {% endfor %}
        <button class="button button-wide" type="submit">Login</button>
        <p>New here? <a href="{% url 'register' %}">Create an account</a></p>
    </form>
</section>
{% endblock %}
